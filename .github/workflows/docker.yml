name: Docker build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - trunk

permissions:
  contents: read
  packages: write

jobs:
  build-images:
    name: Build Docker Images

    strategy:
      matrix:
        arch: [amd64, armv8]

    runs-on: ${{ matrix.arch == 'armv8' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}

    env:
      TAG: ${{ matrix.arch }}

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Login to ghcr
        if: github.ref == 'refs/heads/trunk' && github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login -u ${{ github.repository_owner }} --password-stdin ghcr.io

      - name: Convert GITHUB_REPOSITORY into lowercase
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: Build
        run: |
          podman build \
            --format docker \
            --build-arg FEATURES="" \
            -t roverse:${TAG} \
            .

      - name: Push image
        if: github.ref == 'refs/heads/trunk' && github.event_name != 'pull_request'
        run: |
          podman tag roverse:${TAG} ghcr.io/${REPO}:${TAG}
          podman push ghcr.io/${REPO}:${TAG}

  create-manifest:
    name: Create Docker manifest
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/trunk' && github.event_name != 'pull_request'

    steps:
      - name: Login to ghcr
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login -u ${{ github.repository_owner }} --password-stdin ghcr.io

      - name: Convert GITHUB_REPOSITORY into lowercase
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: Create manifest and push it
        run: |
          podman manifest create roverse-latest docker://ghcr.io/${REPO}:amd64 docker://ghcr.io/${REPO}:armv8
          podman manifest push --format v2s2 roverse-latest docker://ghcr.io/${REPO}:latest
